<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OPSS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- Top Nav -->
  <header class="nav">
    <div class="nav-left">
      <img src="/static/logo.png" class="logo" alt="AFP" />
      <span class="brand">OPSS</span>
    </div>
    <nav class="tabs" role="tablist">
      <a href="#home"    class="tab" role="tab" aria-controls="home"    aria-selected="true">Home</a>
      <a href="#rs"      class="tab" role="tab" aria-controls="rs">Live Pipeline</a>
      <a href="#logsTab" class="tab" role="tab" aria-controls="logsTab">Logs</a>
    </nav>
    <div class="statusbar">
      <span class="dot" id="statusDot" aria-hidden="true"></span>
      <span id="status" class="badge">Disconnected</span>
    </div>
  </header>

  <!-- Pages -->
  <main class="pages">
    <!-- HOME -->
    <section id="home" class="page active" role="tabpanel" aria-labelledby="Home">
      <div class="hero">
        <img src="/static/logo.png" alt="AFP" class="hero-logo" />
        <h1>OPSS — Optical Projectile Sensing System</h1>
        <p class="muted">RealSense → YOLOv8 → Kalman → physics validator → MyCobot 280.</p>
        <p class="muted">Select <em>Live Pipeline</em> to see the annotated feed.</p>
      </div>
    </section>

    <!-- LIVE PIPELINE -->
    <section id="rs" class="page" role="tabpanel" aria-labelledby="Live Pipeline">
      <div class="toolbar">
        <div class="group">
          <button id="start" class="btn primary">Start Pipeline</button>
          <button id="stop" class="btn danger">Stop Pipeline</button>
          <button id="check" class="btn ghost">Status</button>
        </div>
        <div class="group">
          <button id="streamColor" class="btn">Show Annotated Stream</button>
          <button id="stopStreams" class="btn warning">Hide Stream</button>
        </div>
        <div class="group">
          <span id="detectionCount" class="badge" style="background:#0c263d;color:#bfe0ff">0 detections</span>
        </div>
        <div class="devinfo"><span class="kv-key">Capture</span> <span id="devinfo">—</span></div>
      </div>

      <section class="streams-wrap">
        <div class="streams" id="streamsGrid" data-cols="one">
          <figure class="card media" id="colorCard" data-stream="color">
            <header class="card-head">
              <span>Annotated color (YOLO + Kalman + B2₃)</span>
              <div class="card-actions">
                <button class="btn tiny ghost fullscreen" data-img="color">Fullscreen</button>
              </div>
            </header>
            <div class="media-wrap">
              <img id="color" alt="Annotated color stream" />
            </div>
          </figure>
        </div>
      </section>
    </section>

    <!-- LOGS -->
    <section id="logsTab" class="page" role="tabpanel" aria-labelledby="Logs">
      <div class="panel">
        <header class="panel-head">
          <h2>Log</h2>
          <button type="button" class="btn tiny ghost" onclick="document.getElementById('log').textContent=''">Clear</button>
        </header>
        <div class="panel-body">
          <pre id="log"></pre>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
  <script>
    // Tabs (hash routing)
    (function(){
      const pages = [...document.querySelectorAll('.page')];
      const tabs  = [...document.querySelectorAll('.tab')];
      function show(id){
        pages.forEach(p=>p.classList.toggle('active', '#'+p.id===id));
        tabs.forEach(t=>t.setAttribute('aria-selected', t.getAttribute('href')===id));
      }
      window.addEventListener('hashchange', ()=>show(location.hash||'#home'));
      show(location.hash||'#home');
    })();

    // Fullscreen for annotated image
    (function(){
      function fs(el){ if(el.requestFullscreen) el.requestFullscreen(); }
      document.querySelectorAll('.fullscreen').forEach(btn=>{
        btn.addEventListener('click', ()=>fs(document.getElementById(btn.dataset.img)));
      });
    })();

    // Poll /detections/latest for the live count badge
    (function(){
      const countBadge = document.getElementById('detectionCount');
      let pollInterval = null;

      async function updateDetectionCount() {
        try {
          const r = await fetch('/detections/latest');
          const data = await r.json();
          const count = data.detections.length;
          countBadge.textContent = `${count} detection${count !== 1 ? 's' : ''}`;
          countBadge.style.background = count > 0 ? '#113728' : '#0c263d';
          countBadge.style.color = count > 0 ? '#d6ffe9' : '#bfe0ff';
        } catch { /* silent */ }
      }

      const originalStreamColor = window.streamColor;
      window.streamColor = function() {
        originalStreamColor && originalStreamColor();
        if (!pollInterval) pollInterval = setInterval(updateDetectionCount, 500);
      };
      const originalStopStreams = window.stopStreams;
      window.stopStreams = function() {
        originalStopStreams && originalStopStreams();
        if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
        countBadge.textContent = '0 detections';
        countBadge.style.background = '#0c263d';
        countBadge.style.color = '#bfe0ff';
      };
    })();
  </script>
</body>
</html>
