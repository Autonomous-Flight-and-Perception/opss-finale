services:
  cobotpy:
    build: .
    image: cobotpy-demo
    container_name: opss-cobot-dev
    restart: unless-stopped
    
    # USB device for cobot (REQUIRED even in dev)
    devices:
      - ${DEVICE:-/dev/ttyACM0}:${DEVICE:-/dev/ttyACM0}
    
    tty: true
    
    # CRITICAL: Mount /tmp for Unix socket communication
    volumes:
      - /tmp:/tmp
      - .:/app
    
    environment:
      - PORT=${DEVICE:-/dev/ttyACM0}
      - BAUD=1000000
      - PYTHONUNBUFFERED=1
    
    command: python run_unix.py
