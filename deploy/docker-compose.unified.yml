# OPSS cobot controller container.
#
# Topology:
#   Vision service runs on the Jetson HOST (not a container) — see
#   ../vision/ and the repo README for why. The cobot container below
#   reaches it over WebSocket via the host-gateway alias `vh-vision`.
#
# Bring-up:
#   # 1. Start vision on the host (from repo root):
#   cd ../vision && python3 main.py --host 0.0.0.0 --port 8000 \
#                                   --capture-width 640 --capture-height 480 &
#   sleep 10 && curl -X POST http://localhost:8000/pipeline/start
#
#   # 2. Start cobot:
#   cd deploy && docker compose -f docker-compose.unified.yml up -d cobotpy
#
# Override the USB device with DEVICE=/dev/ttyACM1 docker compose ... up.

services:
  cobotpy:
    build:
      context: ../cobot
      dockerfile: Dockerfile
    image: opss-cobot:latest
    container_name: opss-cobot
    restart: unless-stopped
    devices:
      - ${DEVICE:-/dev/ttyACM0}:${DEVICE:-/dev/ttyACM0}
    tty: true
    environment:
      - PORT=${DEVICE:-/dev/ttyACM0}
      - BAUD=1000000
      - INTERFACE_URL=ws://vh-vision:8000/ws/states
      - PYTHONUNBUFFERED=1
    extra_hosts:
      # Route `vh-vision` to the docker host so the container reaches the
      # host-side vision service on port 8000 without code changes.
      - "vh-vision:host-gateway"
    networks:
      - opss-network

networks:
  opss-network:
    driver: bridge
